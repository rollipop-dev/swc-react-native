name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.head_commit.message, 'chore') && contains(github.event.head_commit.message, 'release crates') }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --locked
      - name: Publish to crates.io
        run: cargo workspaces publish --from-git --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
